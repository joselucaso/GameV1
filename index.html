<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Blades - 1x1 Multiplayer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- UI Overlay -->
        <div class="ui-layer">
            <div class="timer-container">
                <div id="timer">90</div>
            </div>
            
            <div class="stats-container">
                <!-- Player 1 HP -->
                <div class="player-stats p1">
                    <div class="health-bar-container">
                        <div id="p1-health" class="health-bar" style="width: 100%;"></div>
                        <div class="health-bar-bg"></div>
                    </div>
                    <div class="round-counters" id="p1-rounds">
                        <div class="round-dot"></div>
                        <div class="round-dot"></div>
                    </div>
                </div>

                <!-- Player 2 HP -->
                <div class="player-stats p2">
                    <div class="health-bar-container">
                        <div id="p2-health" class="health-bar" style="width: 100%;"></div>
                        <div class="health-bar-bg"></div>
                    </div>
                    <div class="round-counters" id="p2-rounds">
                        <div class="round-dot"></div>
                        <div class="round-dot"></div>
                    </div>
                </div>
            </div>

            <div id="status-message" class="hidden">PRONTO?</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Connection UI -->
        <div id="lobby" class="overlay">
            <div class="lobby-content">
                <h1>SHADOW BLADES</h1>
                <p>Multiplayer 1x1 Competitivo</p>
                
                <div class="connection-box">
                    <div id="my-id-display">Gerando ID...</div>
                    <button id="copy-id-btn">Copiar ID</button>
                </div>

                <div class="divider">OU</div>

                <div class="join-box">
                    <input type="text" id="peer-id-input" placeholder="Cole o ID do adversário">
                    <button id="connect-btn">CONECTAR E LUTAR</button>
                </div>
                
                <div class="controls-hint">
                    <p>WASD: Mover/Pular | ESPAÇO: Atacar</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
