<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="description" content="Arena Battle - Jogo 2D estilo Clash Royale">
    <title>Arena Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Tela Inicial -->
    <div id="start-screen">
        <div class="start-content">
            <h1 class="game-title">⚔️ ARENA BATTLE ⚔️</h1>
            <p class="game-subtitle">Destrua as torres e a base inimiga!</p>

            <!-- Seletor de Herói (populado dinamicamente pelo UIManager) -->
            <p class="section-label">ESCOLHA SEU HERÓI</p>
            <div id="hero-selector" class="hero-selector"></div>

            <div class="instructions">
                <p>📱 <strong>Toque</strong> para mover o herói</p>
                <p>⚡ <strong>Botão especial</strong> para habilidade (gasta toda mana)</p>
                <p>⚔️ Ataque automático em inimigos próximos</p>
            </div>
            <button id="btn-start" onclick="startGame()">JOGAR</button>
        </div>
    </div>

    <!-- Tela de Game Over -->
    <div id="gameover-screen" class="hidden">
        <div class="start-content">
            <h1 id="gameover-title" class="game-title">VITÓRIA!</h1>
            <p id="gameover-subtitle" class="game-subtitle"></p>
            <button id="btn-restart" onclick="restartGame()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <!-- Canvas do Jogo -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI do Jogo (overlay) -->
    <div id="game-ui" class="hidden">
        <!-- Nome do herói -->
        <div id="hero-name-container">
            <span id="hero-name-label"></span>
        </div>

        <!-- Nome do herói inimigo -->
        <div id="enemy-name-container">
            <span id="enemy-name-label"></span>
        </div>

        <!-- Barra de HP do Herói -->
        <div id="hero-hp-bar" class="ui-bar">
            <div class="bar-label">❤️ HP</div>
            <div class="bar-bg">
                <div id="hp-fill" class="bar-fill hp"></div>
            </div>
            <span id="hp-text" class="bar-text">250/250</span>
        </div>

        <!-- Barra de Mana -->
        <div id="hero-mana-bar" class="ui-bar">
            <div class="bar-label">💎 MANA</div>
            <div class="bar-bg">
                <div id="mana-fill" class="bar-fill mana"></div>
            </div>
            <span id="mana-text" class="bar-text">0/100</span>
        </div>

        <!-- Botão de Habilidade Especial -->
        <button id="btn-special" onclick="useSpecial()">
            <span class="special-icon">⚡</span>
            <span class="special-label">ESPECIAL</span>
        </button>

    </div>

    <!-- 
        Scripts do jogo — ordem de carregamento importante!
        1. Config (constantes + registros de dados)
        2. Core (EventBus + Entity base)
        3. Combat (visuais de ataque + habilidades)
        4. Rendering (efeitos visuais + renderizador de herói)
        5. AI (inteligência artificial)
        6. Entities (Base, Tower, Minion, Hero)
        7. Managers (Renderer, SpawnManager, UIManager, InputManager, CollisionManager, GameManager)
        8. Main (entry point)
    -->

    <!-- Config -->
    <script src="js/config/GameConfig.js"></script>
    <script src="js/config/HeroRegistry.js"></script>
    <script src="js/config/MapRegistry.js"></script>

    <!-- Core -->
    <script src="js/core/EventBus.js"></script>
    <script src="js/core/Entity.js"></script>

    <!-- Combat -->
    <script src="js/combat/AttackVisualRegistry.js"></script>
    <script src="js/abilities/AbilitySystem.js"></script>

    <!-- Rendering -->
    <script src="js/rendering/EffectRenderer.js"></script>
    <script src="js/rendering/HeroRenderer.js"></script>

    <!-- AI -->
    <script src="js/ai/HeroAI.js"></script>

    <!-- Entities -->
    <script src="js/entities/Base.js"></script>
    <script src="js/entities/Tower.js"></script>
    <script src="js/entities/Minion.js"></script>
    <script src="js/entities/Hero.js"></script>

    <!-- Managers -->
    <script src="js/managers/Renderer.js"></script>
    <script src="js/managers/SpawnManager.js"></script>
    <script src="js/managers/UIManager.js"></script>
    <script src="js/managers/CollisionManager.js"></script>
    <script src="js/input/InputManager.js"></script>
    <script src="js/managers/GameManager.js"></script>

    <!-- Entry Point -->
    <script src="js/main.js"></script>
</body>
</html>
